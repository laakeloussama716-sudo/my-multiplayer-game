<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top-Down Shooter: Online Tactical Souls</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background-color: #0d131a; font-family: sans-serif; user-select: none; }
        canvas { display: block; }
    </style>
    <!-- ??????? ????? Socket.io ?????? ?????????? -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
</head>
<body>

    <canvas id="game"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        function resize(){
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resize();
        window.addEventListener("resize", resize);

        // --- ??????? ?????? ????????? ---
        // ?????? ??? ?????? ????? ??????? ????? ?? ??? ???? (????: https://my-game-server.onrender.com)
 const socket = io("https://my-online-game-1n7l.onrender.com");

        const keys = {};
        window.onkeydown = e => keys[e.key.toLowerCase()] = true;
        window.onkeyup = e => keys[e.key.toLowerCase()] = false;

        const world = { w: 4000, h: 4000 };
        
        // ?????? ?????? ????? ??
        const player = {
            id: null,
            x: Math.random() * 500 + 200,
            y: Math.random() * 500 + 200,
            r: 16,
            speed: 6.5,
            hp: 100,
            angle: 0,
            walkCycle: 0
        };

        let camera = { x: 0, y: 0 };
        let mouse = { x: 0, y: 0 };
        
        // ?????? ?????? ???????? ??????? ???????? ?? ???????
        let otherPlayers = {};
        let bullets = [];

        // ??? ???? ??????? ????????
        socket.on("connect", () => {
            player.id = socket.id;
            // ????? ?????? ?????? ?????? ???????
            socket.emit("newPlayer", { x: player.x, y: player.y, angle: player.angle });
        });

        // ??????? ??????? ??????? ????? ???????? ?? ???????
        socket.on("stateUpdate", (serverPlayers) => {
            otherPlayers = serverPlayers;
        });

        // ??????? ?????? ?????? ?? ???????? ???????
        socket.on("bulletFired", (bulletData) => {
            bullets.push(bulletData);
        });

        window.addEventListener("mousemove", e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener("click", () => {
            // ????? ????? ?????? ??????? ??????? ??? ???? ??????
            let bulletData = {
                x: player.x + Math.cos(player.angle) * 20,
                y: player.y + Math.sin(player.angle) * 20,
                vx: Math.cos(player.angle) * 14,
                vy: Math.sin(player.angle) * 14,
                id: player.id
            };
            bullets.push(bulletData);
            socket.emit("shoot", bulletData);
        });

        function update() {
            let moved = false;
            let nx = player.x;
            let ny = player.y;

            if (keys["w"] || keys["arrowup"]) { ny -= player.speed; moved = true; }
            if (keys["s"] || keys["arrowdown"]) { ny += player.speed; moved = true; }
            if (keys["a"] || keys["arrowleft"]) { nx -= player.speed; moved = true; }
            if (keys["d"] || keys["arrowright"]) { nx += player.speed; moved = true; }

            player.x = Math.max(0, Math.min(world.w, nx));
            player.y = Math.max(0, Math.min(world.h, ny));

            let dx = mouse.x + camera.x - player.x;
            let dy = mouse.y + camera.y - player.y;
            player.angle = Math.atan2(dy, dx);

            if (moved) player.walkCycle += 0.25;

            // ????? ?????? ??????? ??????? ?????
            if (player.id) {
                socket.emit("move", { x: player.x, y: player.y, angle: player.angle });
            }

            camera.x = player.x - canvas.width / 2;
            camera.y = player.y - canvas.height / 2;

            // ????? ???? ??????
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                if (b.x < 0 || b.y < 0 || b.x > world.w || b.y > world.h) {
                    bullets.splice(i, 1);
                }
            }
        }

        function drawHuman(x, y, r, angle, color) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            // ?????
            ctx.fillStyle = color;
            ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();
            // ??????
            ctx.fillStyle = "#212121";
            ctx.fillRect(5, -5, r * 1.5, 6);
            ctx.restore();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-camera.x, -camera.y);

            // ????? ???????
            ctx.fillStyle = "#37474F";
            ctx.fillRect(0, 0, world.w, world.h);

            // ??? ?????? ????? ?? (?????? ??????)
            drawHuman(player.x, player.y, player.r, player.angle, "#1565C0");

            // ??? ???????? ??????? ???????? ???????? (?????? ??????)
            for (let id in otherPlayers) {
                if (id !== player.id) {
                    let p = otherPlayers[id];
                    drawHuman(p.x, p.y, 16, p.angle, "#C62828");
                }
            }

            // ??? ??????
            ctx.fillStyle = "#FFF176";
            bullets.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, 4, 0, Math.PI*2); ctx.fill();
            });

            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
